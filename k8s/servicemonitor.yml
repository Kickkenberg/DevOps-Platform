apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: demo-app-monitor
  namespace: monitoring
  labels:
    release: monitoring

spec:
  selector:
    matchLabels:
      app: demo-app

  namespaceSelector:
    matchNames:
      - devops-platform

  endpoints:
  - port: http
    interval: 15s